syntax = "proto3";

package patient.events; // this is the package name for the generated code, it helps to organize the code in a structured way
option java_multiple_files = true;

message PatientEvent {
  string patientId = 1;
  string name = 2;
  string email = 3;
  string eventType = 4; // e.g., "CREATED", "UPDATED", "DELETED"
}